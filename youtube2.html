<DOCTYPE html> 
    <html>
        <head>
            <title>
                youtube clone
            </title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Roboto:wdth,wght@75..100,100..900&display=swap" rel="stylesheet">



            <style>
                P { 
                    font-family: Roboto, Arial;
                }
                
                .search-bar {
                    display: block;
                     font: bold;
                    border-radius: 10px;
                    padding: 10px;
                    border-style: solid; 
                    cursor: pointer;
                    margin-top: 10px;
                    margin-bottom: 10px;
                   
                }
                .title { 
                    width: 300px;
                   
                }
                .videopreview {
                    display: inline-block;
                    margin-right: 20px;
                    vertical-align: top;
                }
                


                .thumbnail{
                    width: 300px;
                    display: inline-block;
                }

            </style>
        </head>
        <body>
            <input class="search-bar" placeholder="search">

            <div class="videopreview">
            <img class="thumbnail" src="thumbnails/thumbnail-1.webp">


            <p class="title">Talking Tech and AI with Google CEO Sundar Pichai!</p>
            <p class="channel"> Marques Brownlee</p>
            <p class="views"> 3.4M views &#183; 6 months ago</p>
            </div>
            
            <div class="videopreview">
            <img class="thumbnail"
             src="thumbnails/thumbnail-2.webp">
            <p class="title">Try Not To Laugh Challenge #9</p>
            <p class="channel">Markiplier</p>
            <p class="views">19M views · 4 years ago</p>
            </div>
        </body>
    </html>
