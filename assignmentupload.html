<!DOCTYPE html>
<html> 
    <head> 
    <title>SIGNUP FORM</title>
    <style>
        body {
    display: flex;
    justify-content: center;  /* center horizontally */
    align-items: center;      /* center vertically */
    height: 100vh;            /* full screen height */
    margin: 0;
}
.container {
    background-image: url("thumbnails/agro-1.webp");
    background-size: cover;
    background-position: center;
    color: white;
     padding: 600px;
    border-radius: 10px;
}


        
        .surname-name , 
        .First-name{
            font-weight: bold;
            padding-top: 8px;
            padding-bottom: 8px; 
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 8px;
            width: 120px;
            border-style: solid; 
            background-color: transparent;   
            border: none;         
        }
        .Email {
            font-weight: bold;
            padding-top: 8px;
            padding-bottom: 8px; 
            padding-left: 8px;
            padding-right: 8px; 
            margin-left: 3px;
            margin-right: 3px;
            margin-top: 3px;
            display: block;
             border-radius: 8px;
            width: 260px;
            border-style: solid;
            background-color: transparent;
           
        }
        .sign-up {
            font: bold;
            color: white;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 100px;
            padding-right: 100px;
            border: none;
            background-color: rgb(60, 140, 214); 
            font-family:  Arial;
            border-radius: 5px; 
            margin-top: 7px;
            width: 280px;
            cursor: pointer;
            display: block; 
        }
        .sign-up:hover{
            opacity: 0.5;
        }

    </style>
    </head>
    <body >
        <div class="container">
        <input class="surname-name" placeholder="Surname name">
        <input class="First-name" placeholder="Frist-name">
        <input class="Email" placeholder="Email">
        <button class="sign-up">SIGN UP</button>
        </body>
        </html>
    </div>
</html>
