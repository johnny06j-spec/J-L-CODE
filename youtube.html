<!DOCTYPE html>
<html> 
    <head> <title>Youtube.com clone</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wdth,wght@75..100,100..900&display=swap" rel="stylesheet">
        <style> 
        p { 
            font-family: Roboto, Arial;
        }
        .thumbnail{ 
            width: 300px; 
            object-fit: contain;
            display: block;
        }
        .search-bar { 
            font-size: 20px;
            margin-left: 10px;
            border-radius: 10px;
            border-style: solid;
            padding-top: 2px;
            padding-bottom: 2px;
            padding-left: 2px;
            padding-right: 2px; 
        }
        .video-title {
            width: 300px; 
        }
        .video-author,
        .no-of-view{
            display: inline-block;
        }
        
        </style> 
    </head> 
    <body>
        <div>
        <input class="search-bar" type="text" placeholder="search"> 
         <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
         <p class="video-title">Talking Tech a d AI with Google  CEO Sundar Pichai!</p>
         <p class="video-author">Marques Brownlee</p>
         <p class="no-of-view">3.4M views &#183; months ago</p>
        </div>
    </body>  

</html>
