<!DOCTYPE html> 
<html> 
    <head> 
        <title>BUTTON ASSINGMENT</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style>
            .request-button { 
                background-color: black;
                color:white;
                padding-top: 10px;
                padding-left: 10px;
                padding-right: 10px;
                padding-bottom: 10px;
                border-radius: 2px; 
                font-family: Roboto;
                margin-top: 20px;
                margin-left: 10px;
                cursor: pointer; 
            }
             

            .request-button:hover { 
                opacity: 0.5;
                box-shadow: 5px 5px 10px rgba(0, 0, 0, 5);
            }
            
            .request-button:active { 
                opacity: 0.9;
            }

            .add-button { 
                background-color: rgb(252, 228, 17);
                color: black; 
                padding-top: 10px;
                padding-left: 40px; 
                padding-right: 40px;
                padding-bottom: 10px;
                border: none;
                border-radius: 20px;
                font-family: Roboto;
                font-weight: bold;
                margin-left: 10px;
                cursor:pointer;
            }
            .add-button:hover{
                 opacity: 0.5; 
                 box-shadow: 5px 5px 10px rgba(0, 0, 0, 5);
                }

                .add-button:active {
                    opacity: 0.8;
                }


                .sign-up { 
                    background-color: rgb(72, 167, 72); 
                    color: white; 
                    padding-left: 20px;
                    padding-bottom: 10px;
                    padding-right: 20px;
                    padding-top: 10px;
                    border-radius: 4px;
                    border: none;
                    font-weight: bold;
                    font-family: Roboto;
                    margin-left: 10px;
                }
                .sign-up:hover { 
                    opacity: 0.5; 
                    box-shadow: 5px 5px 10px rgba(0, 0, 0, 5);
                }

                .sign-up:active { 
                    opacity: 0.9;
                } 
                .get-started { 
                    background-color: rgb(118, 44, 164);  
                    color: white; 
                    padding-top: 10px;
                    padding-left: 20px; 
                    padding-right: 20px; 
                    padding-bottom: 10px; 
                    border: none;
                    border-radius: 3px; 
                    font-family: Roboto;
                    font-weight: bold; 
                    margin-left: 20px; 
                }

                .get-started:hover {
                    opacity: 0.5;
                    box-shadow: 3px 5px 10px rgba(0, 0, 0, 5);
                }
                .get-started:active { 
                    opacity: 0.8; 
                }
                .download-button { 
                    background-color: rgba(127, 120, 120, 0.858);
                    color: white; 
                    font-family: Roboto;
                    padding-top:10px;
                    padding-left:10px;
                    padding-right:10px;
                    padding-bottom: 10px; 
                    border: none; 
                    border-radius: 3px; 
                    margin-left: 5px;
                }
                .download-button:hover {
                      opacity: 0.5;
                    box-shadow: 3px 5px 10px rgba(0, 0, 0, 5);
                }
                 .download-button:active { 
                    opacity: 0.8;
                 } 

                 .Apply-button {
                    background-color: rgb(82, 139, 213);
                    color: white; 
                    padding-left: 20px;
                    padding-right: 20px; 
                    padding-top: 10px;
                    padding-bottom: 10px; 
                    margin-top:10px;
                    border-radius: 20px;
                    border: none;
                    font-family: Roboto;
                    font-weight: bold; 

                 }
                 .Apply-button:hover{ 
                      opacity: 0.5;
                    box-shadow: 3px 5px 10px rgba(0, 0, 0, 5);
                }
                
                    .Apply-button:active { 
                        opacity: 0.9;
                    }
                    .save-button { 
                        background-color: white;
                        color: rgb(111, 111, 230); 
                        border-color: rgb(111, 111, 211); 
                        border-radius: 20px;
                        padding-top: 5px;
                        padding-left: 15px;
                        padding-bottom: 5px; 
                        padding-right: 15px;
                        border-style: solid; 
                        margin-left: 3px; 
                        font-family: Roboto;
                        font-weight: bold;
                        }
                        .save-button:hover {  
                            background-color: rgb(239, 247, 249);
                    box-shadow: 3px 4px 6px rgba(0, 0, 0, 5);
                }

            

                        .save-button:active {
                            opacity:0.8;
                        }

                        .youtube-icon {
                            background-color: red;
                            color: rgb(252, 252, 252);
                            padding-bottom: 5px;
                            padding-left: 7px;
                            padding-right: 7px;
                            padding-top: 5px;
                            border-radius: 7px;
                            margin-top: 30px; 
                            margin-left: 5px; 
                            margin-bottom: 10px; 

                        }





            
 



           




        </style>
    </head>
    <body>
        <button class="request-button">
            Request now
        </button>
        <button class=" add-button">
             add to cart
            </button>
        <button class="sign-up button">
            Sign up
        </button>
        <button class=" get-started"> Get started</button>
        </button> 
        <button class="download-button">
             Download
            </button>
            <button class=" Apply-button"> 
                Apply on company website
            </button> 
            <button class="save-button">
                Save
            </button>

        </svg>
    </body>


</html>
