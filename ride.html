<!DOCTYPE html> 
<html>
    <head> 
        <title>UBER REQUEST A RIDE</title>
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh; 
                 margin: 0;

            }
            .container {
                background-image: url(thumbnails/uber\ 2\ edit.jpg);
                 background-size: cover;
                 padding: 500px;
                }
                .uber-head {
                    font-family: Arial;
                    color: rgb(134, 21, 21); 
                    width: 400px;
                }
                .pick,
                .destination {
                    font: bold;
                    display: block;
                    padding-top: 10px;
                    padding-bottom: 10px;
                    border: none;
                    margin-top: 10px;
                    padding-right: 200px;
                    background-color: rgba(255, 255, 255, 0.645);
                    border-radius: 5px;
                }
                .now {
                    background-color:rgb(0, 0, 0);
                    color:white;
                    padding-left: 50px;
                    padding-top: 10px;
                    padding-bottom: 10px;
                    padding-right: 50px;
                    border: none;
                    margin-top: 5px;
                    cursor:pointer; 
                }
                .now:hover{
                    opacity: 0.5;
                }
                .now:active{ 
                    opacity: 0.10;
                }
                .for {
                    background-color: rgba(255, 255, 255, 0.692);
                    border: none;
                    padding-left: 35px;
                    padding-right: 35px;
                    padding-bottom: 10px;
                    padding-top: 10px;
                    border-radius: 5px;
                    cursor: pointer;
                    margin-left: 15px;
                    margin-top: 5px;
                }
                .for:hover{
                    opacity: 0.5;
                }
                .for:active{
                    background-color: rgb(58, 55, 55);
                }
        </style>
    </head>
    <body>
        <div class="container">
        <h1 class="uber-head">UBER REQUEST A RIDE</h1>
        <input class="pick" placeholder="Enter Pickup Location">
        <input class="destination" placeholder="Enter Distionation">
        <button class="now">Request now</button>
        <button class="for"> Schedule for later</button>
        </div>
    </body>
</html>
